<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BikeFit Mobile Fix</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --sidebar-bg: #ffffff;
            --accent-blue: #007aff;
            --text-main: #1d1d1f;
            --border-color: #d2d2d7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Responsive Grid */
        .app-container {
            display: grid;
            grid-template-columns: 1fr;
            width: 100%;
        }

        @media (min-width: 1025px) {
            .app-container { grid-template-columns: 300px 1fr 300px; height: 100vh; }
            .sidebar { overflow-y: auto; }
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            background: var(--bg-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* Canvas Container for sizing */
        .canvas-container {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1.2 / 1;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas { width: 100%; height: 100%; touch-action: none; }

        /* UI Styling */
        .sidebar { background: var(--sidebar-bg); padding: 20px; box-sizing: border-box; }
        .input-group { margin-bottom: 15px; background: #f9f9fb; padding: 12px; border-radius: 12px; }
        label { display: block; font-size: 12px; color: #86868b; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
        .val-display { float: right; color: var(--accent-blue); }
        
        input[type="range"] { width: 100%; height: 25px; accent-color: var(--accent-blue); }
        input[type="number"] { width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 8px; }

        .stats-banner {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-around;
            background: white;
            margin-top: 10px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
    </style>
</head>
<body>

<div class="app-container">
    <main>
        <div class="canvas-container">
            <canvas id="bikeCanvas"></canvas>
        </div>
        <div class="stats-banner">
            <span id="stat-knee">Knee Angle: --</span>
            <span id="stat-hip">Trunk: --</span>
        </div>
    </main>

    <aside class="sidebar">
        <h2>Geometry (mm)</h2>
        <div class="input-group">
            <label>Reach <span class="val-display" id="reach-val">393</span></label>
            <input type="range" id="reach" min="300" max="500" value="393">
        </div>
        <div class="input-group">
            <label>Stack <span class="val-display" id="stack-val">580</span></label>
            <input type="range" id="stack" min="450" max="700" value="580">
        </div>
        <div class="input-group">
            <label>Seat Height <span class="val-display" id="seatHeight-val">760</span></label>
            <input type="range" id="seatHeight" min="500" max="900" value="760">
        </div>
        <div class="input-group">
            <label>Seat Angle (°) <span class="val-display" id="seatAngle-val">73</span></label>
            <input type="range" id="seatAngle" min="65" max="85" step="0.5" value="73">
        </div>

        <h2>Rider State</h2>
        <div class="input-group">
            <label>Trunk Angle <span class="val-display" id="trunk-val">45</span></label>
            <input type="range" id="trunkAngle" min="0" max="90" value="45">
        </div>
        <div class="input-group">
            <label>Crank Rot <span class="val-display" id="rot-val">90</span></label>
            <input type="range" id="crankRot" min="0" max="360" value="90">
        </div>
    </aside>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        const canvas = document.getElementById('bikeCanvas');
        const ctx = canvas.getContext('2d');
        
        // --- HiDPI Scaling Fix ---
        function setupCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.parentNode.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            // Use logical CSS pixels for drawing math
            return { w: rect.width, h: rect.height };
        }

        let dims = setupCanvas();
        window.addEventListener('resize', () => { dims = setupCanvas(); update(); });

        const toRad = deg => deg * (Math.PI / 180);
        const toDeg = rad => rad * (180 / Math.PI);

        function solveIK(p1, p2, l1, l2, flip = false) {
            const dx = p2.x - p1.x, dy = p2.y - p1.y;
            const d = Math.sqrt(dx*dx + dy*dy);
            if (d > l1 + l2 || d < Math.abs(l1 - l2)) return null;
            const a = (l1*l1 - l2*l2 + d*d) / (2*d);
            const h = Math.sqrt(Math.max(0, l1*l1 - a*a));
            const x2 = p1.x + a*dx/d, y2 = p1.y + a*dy/d;
            const rx = -dy*(h/d), ry = dx*(h/d);
            return flip ? {x: x2-rx, y: y2-ry} : {x: x2+rx, y: y2+ry};
        }

        function update() {
            const get = id => parseFloat(document.getElementById(id).value);
            const reach = get('reach'), stack = get('stack'), sH = get('seatHeight'), sA = get('seatAngle');
            const tA = get('trunkAngle'), cRot = get('crankRot');
            
            // UI Sync
            ['reach','stack','seatHeight','seatAngle','trunkAngle','crankRot'].forEach(id => {
                document.getElementById(id+'-val').innerText = document.getElementById(id).value;
            });

            // Math (mm)
            const scale = 0.45;
            const offset = { x: dims.w * 0.35, y: dims.h * 0.75 };
            
            const bb = {x:0, y:0};
            const pedal = {x: Math.sin(toRad(cRot))*172.5, y: -Math.cos(toRad(cRot))*172.5};
            const saddle = {x: -Math.cos(toRad(sA))*sH, y: -Math.sin(toRad(sA))*sH};
            const bars = {x: reach, y: -stack};
            const shoulder = {x: saddle.x + Math.cos(toRad(-tA))*650, y: saddle.y + Math.sin(toRad(-tA))*650};
            
            const knee = solveIK(saddle, pedal, 450, 500, false);
            const elbow = solveIK(shoulder, bars, 300, 300, true);

            // Draw
            ctx.clearRect(0,0, dims.w, dims.h);
            const px = p => ({x: offset.x + p.x*scale, y: offset.y + p.y*scale});
            
            const sBB = px(bb), sS = px(saddle), sP = px(pedal), sB = px(bars), sSh = px(shoulder);

            // Bike
            ctx.strokeStyle = "#333"; ctx.lineWidth = 4; ctx.beginPath();
            ctx.moveTo(sBB.x, sBB.y); ctx.lineTo(sS.x, sS.y); 
            ctx.moveTo(sBB.x, sBB.y); ctx.lineTo(sB.x, sB.y); ctx.stroke();

            // Rider
            ctx.strokeStyle = "#007aff"; ctx.lineWidth = 5; ctx.lineCap = "round";
            if(knee) {
                const sK = px(knee);
                ctx.beginPath(); ctx.moveTo(sS.x, sS.y); ctx.lineTo(sK.x, sK.y); ctx.lineTo(sP.x, sP.y); ctx.stroke();
                
                // Knee Angle Calculation
                const d = Math.hypot(saddle.x-pedal.x, saddle.y-pedal.y);
                const kA = toDeg(Math.acos((450**2 + 500**2 - d**2)/(2*450*500)));
                document.getElementById('stat-knee').innerText = `Knee Angle: ${Math.round(kA)}°`;
                document.getElementById('stat-hip').innerText = `Trunk: ${tA}°`;
            }

            ctx.beginPath(); ctx.moveTo(sS.x, sS.y); ctx.lineTo(sSh.x, sSh.y);
            if(elbow) { const sE = px(elbow); ctx.lineTo(sE.x, sE.y); ctx.lineTo(sB.x, sB.y); }
            ctx.stroke();
        }

        document.querySelectorAll('input').forEach(i => i.addEventListener('input', update));
        update();
    });
</script>
</body>
</html>
